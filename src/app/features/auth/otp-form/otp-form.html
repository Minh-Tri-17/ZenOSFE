<div class="form-section" [class.active-form]="isActiveForm()">
  <h2 class="form-title-step">Step 1: Send Verification Code</h2>
  <form
    class="needs-validation"
    novalidate
    [formGroup]="mailForm"
    [class.was-validated]="wasValidated()"
    (submit)="$event.preventDefault()">
    <div class="form-group">
      <label for="email" class="text-on-surface-variant login-form-label small fw-semibold"
        >Email</label
      >
      <input
        type="email"
        class="ghost-input form-control"
        id="email"
        formControlName="to"
        placeholder="Enter your email address"
        [class.is-invalid]="mailForm.controls.to.invalid && wasValidated()" />
      <div class="invalid-feedback">
        @for (error of getErrors('to'); track error) {
          <div>{{ error }}</div>
        }
      </div>
    </div>
    <button type="button" class="button btn btn-step-submit w-100" (click)="handleSendCode()">
      <span class="fold"></span>
      <div class="points-wrapper">
        <i class="point"></i>
        <i class="point"></i>
        <i class="point"></i>
        <i class="point"></i>
        <i class="point"></i>
        <i class="point"></i>
        <i class="point"></i>
        <i class="point"></i>
        <i class="point"></i>
        <i class="point"></i>
        <i class="point"></i>
        <i class="point"></i>
        <i class="point"></i>
        <i class="point"></i>
        <i class="point"></i>
      </div>
      <span class="inner">
        <i class="fa-regular fa-envelope me-2"></i> Send Verification Code
      </span>
    </button>
    <div class="back-link-container">
      <a href="#" (click)="handleBackToLogin($event)" class="link-back" id="btnBackToLogin"
        ><i class="fa-solid fa-arrow-left me-2"></i>Back to Login</a
      >
    </div>
  </form>
</div>
