<div class="login-body">
  <div class="login-container">
    <div class="login-left">
      <div class="art-frame">
        <img src="images/topic.png" alt="Spa Therapy Art" class="art-image" />
      </div>
    </div>

    <div class="login-right">
      <div class="login-card glass-card">
        <app-login-form></app-login-form>

        <app-otp-form (email)="setOtpEmail($event)"></app-otp-form>

        <app-reset-form [email]="otpEmail()"></app-reset-form>
      </div>
    </div>
  </div>
</div>
